<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VictoryLabs · Burner</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Italianno&family=Fira+Code:wght@400;500;600&display=swap');

:root {
  --bg: #07060e;
  --bg-2: #0d0b1a;
  /* Polish-pass: opaque elevated surface + purple-alpha borders so cards
     visibly LIFT above the page even without backdrop-filter support.
     Frosted-glass effect is rebuilt by layering a faint white wash on
     top of the opaque base via background-image. */
  --surface: #231e3d;
  --surface-solid: #231e3d;
  --surface-2: #2c2649;
  --border: rgba(168, 144, 232, 0.30);
  --border-h: rgba(168, 144, 232, 0.50);
  --shadow-card:
    0 1px 0 rgba(255,255,255,0.03) inset,
    0 8px 24px -10px rgba(0,0,0,0.55),
    0 2px 6px rgba(0,0,0,0.35);
  --fg: #f2eeff;
  --fg-2: #a59fc4;
  --fg-3: #7a7497;
  --fg-4: #524d6e;
  --purple: #a890e8;
  --purple-2: #d0c8e4;
  --purple-soft: rgba(168,144,232,0.14);
  --purple-border: rgba(168,144,232,0.40);
  --green: #4fb67d;
  --red: #ef7878;
  --amber: #fbbf24;
  --blue: #60a5fa;
  --accent: var(--purple);
  --accent-soft: var(--purple-soft);
  --accent-border: var(--purple-border);
  --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-mono: 'Fira Code', 'SF Mono', ui-monospace, monospace;
  --font-serif: 'Playfair Display', Georgia, serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background:
    radial-gradient(ellipse 800px 500px at 20% 0%, rgba(128,104,216,0.10), transparent 60%),
    radial-gradient(ellipse 700px 400px at 100% 100%, rgba(168,144,232,0.06), transparent 60%),
    var(--bg);
  background-attachment: fixed;
  color: var(--fg);
  font-family: var(--font-ui);
  font-size: 14px;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
body { font-feature-settings: "tnum"; }
.mono { font-family: var(--font-mono); }
button { font-family: inherit; cursor: pointer; }
input { font-family: inherit; }

.vl-app { max-width: 1080px; margin: 0 auto; padding: 22px 20px 140px; min-height: 100vh; }

/* HEADER — mirrors nft-live-feed TopNav: full-bleed gradient chrome, 44px
   tall, sliding-pill active state. Inner content is constrained to the
   same 1080px column the rest of the burner uses so the logo aligns with
   the stats grid below. */
.vl-header {
  width: 100vw;
  margin-left: calc(50% - 50vw);
  margin-top: -22px;
  margin-bottom: 14px;
  background: linear-gradient(180deg, rgba(20,14,34,0.7) 0%, rgba(10,8,18,0.95) 100%);
  border-bottom: 1px solid rgba(255,255,255,0.04);
  box-shadow: 0 1px 0 rgba(128,104,216,0.04), 0 8px 24px rgba(0,0,0,0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  position: relative;
  z-index: 100;
}
.vl-header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 44px;
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 20px;
  gap: 12px;
}
.vl-brand { display: flex; align-items: center; gap: 32px; }
.vl-brand-logo {
  height: 38px;
  width: auto;
  display: block;
  margin-left: 6px;
  user-select: none;
  -webkit-user-drag: none;
}
.vl-brand-nav {
  display: flex;
  align-items: center;
  gap: 2px;
  position: relative;
}
.vl-nav-item {
  position: relative;
  z-index: 1;
  padding: 5px 16px;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
  border-radius: 4px;
  background: transparent;
  border: none;
  color: #55556e;
  transition: color 180ms ease-out, background 180ms ease-out;
  cursor: pointer;
}
.vl-nav-item:hover { color: #aaaabf; }
.vl-nav-item.is-active {
  color: #d0c8e4;
  background: linear-gradient(180deg, rgba(128,104,216,0.14) 0%, rgba(128,104,216,0.04) 100%);
  box-shadow: 0 0 12px rgba(128,104,216,0.15), inset 0 0 0 1px rgba(128,104,216,0.12);
}

.vl-header-actions { display: flex; align-items: center; gap: 8px; }
.vl-wallet-pill { display: inline-flex; align-items: center; gap: 8px; padding: 5px 12px 5px 10px; background: var(--purple-soft); border: 1px solid var(--purple-border); border-radius: 20px; color: var(--fg); font-family: var(--font-mono); font-size: 12px; transition: all 0.15s; white-space: nowrap; cursor: pointer; }
.vl-wallet-pill:hover { background: rgba(168,144,232,0.18); border-color: var(--purple); }
.vl-wallet-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); }
.vl-wallet-net { color: var(--purple-2); font-size: 10px; letter-spacing: 0.3px; padding-left: 8px; border-left: 1px solid var(--purple-border); }

/* WARNING STRIP */
.vl-warn { display: flex; align-items: center; gap: 10px; padding: 6px 12px; background: rgba(239,120,120,0.035); border: 1px solid rgba(239,120,120,0.14); border-radius: 10px; color: rgba(239,120,120,0.78); font-size: 12px; margin-bottom: 14px; }
.vl-warn b { color: #f8a7a7; font-weight: 600; }
.vl-warn-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); flex-shrink: 0; animation: vl-pulse 2s ease-in-out infinite; }
.vl-warn-sep { flex: 1; }
.vl-warn-mode { font-family: var(--font-mono); color: var(--fg-3); font-size: 11px; letter-spacing: 0.2px; }
.vl-warn-mode b { color: var(--fg); font-weight: 600; }
@keyframes vl-pulse { 0%,100% { box-shadow: 0 0 0 0 currentColor; opacity: 1; } 50% { box-shadow: 0 0 0 4px transparent; opacity: 0.6; } }

/* STATS */
.vl-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
.vl-stat { background: linear-gradient(rgba(255,255,255,0.05), rgba(255,255,255,0.05)), var(--surface); backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%); border: 1px solid rgba(168,144,232,0.40); border-radius: 10px; padding: 12px 14px; display: flex; flex-direction: column; gap: 2px; box-shadow: var(--shadow-card); transition: border-color 0.18s, background 0.18s, box-shadow 0.18s; }
.vl-stat:hover { border-color: var(--border-h); background: linear-gradient(rgba(168,144,232,0.08), rgba(168,144,232,0.08)), var(--surface); }
.vl-stat-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.4px; color: var(--fg-3); text-transform: uppercase; }
.vl-stat-val { font-size: 22px; font-weight: 700; color: var(--fg); line-height: 1.2; font-variant-numeric: tabular-nums; letter-spacing: -0.4px; }
.vl-stat-val.accent-purple { color: var(--purple-2); }
.vl-stat-val.accent-muted { color: var(--fg-2); }
.vl-stat-sub { font-family: var(--font-mono); font-size: 11px; color: var(--fg-4); }

/* TABS */
.vl-tabs { display: flex; align-items: center; gap: 4px; border-bottom: 1px solid var(--border); margin-bottom: 14px; overflow-x: auto; scrollbar-width: none; }
.vl-tabs::-webkit-scrollbar { display: none; }
.vl-tab { display: inline-flex; align-items: center; gap: 7px; background: transparent; border: none; padding: 10px 14px; color: var(--fg-3); font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; white-space: nowrap; }
.vl-tab:hover { color: var(--fg); }
.vl-tab.is-active { color: var(--purple-2); border-bottom-color: var(--purple); }
.vl-tab-count { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--fg-3); }
.vl-tab.is-active .vl-tab-count { background: var(--purple-soft); color: var(--purple-2); }
.vl-tabs-spacer { flex: 1; }
.vl-tab-action { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid var(--border); border-radius: 6px; padding: 6px 10px; color: var(--fg-2); font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; margin: 4px 0; transition: all 0.15s; }
.vl-tab-action:hover:not(:disabled) { border-color: var(--border-h); color: var(--fg); }
.vl-tab-action:disabled { opacity: 0.6; cursor: wait; }

/* TOOLBAR */
.vl-toolbar { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
.vl-search { display: inline-flex; align-items: center; gap: 7px; background: linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0.04)), var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; flex: 1; min-width: 220px; max-width: 360px; transition: border-color 0.18s, box-shadow 0.18s, background 0.18s; }
.vl-search:focus-within { border-color: var(--purple); background: linear-gradient(rgba(168,144,232,0.05), rgba(168,144,232,0.05)), var(--surface); box-shadow: 0 0 0 3px rgba(168,144,232,0.14), 0 0 18px -6px rgba(168,144,232,0.45); }
.vl-search:focus-within svg { color: var(--purple-2); }
.vl-search svg { color: var(--fg-3); flex-shrink: 0; transition: color 0.18s; }
.vl-search input { background: transparent; border: none; color: var(--fg); font-size: 13px; outline: none; width: 100%; }
.vl-search input::placeholder { color: var(--fg-2); opacity: 0.65; }
.vl-toolbar-btn { background: transparent; border: 1px solid var(--border); color: var(--fg-2); padding: 9px 14px; border-radius: 6px; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.3px; transition: all 0.18s; }
.vl-toolbar-btn:hover:not(:disabled) { border-color: var(--purple); color: var(--purple-2); background: rgba(168,144,232,0.08); box-shadow: 0 0 0 1px rgba(168,144,232,0.18); }
.vl-toolbar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.vl-toolbar-meta { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-left: auto; }

/* COLLECTIONS — outer panel mirrors the live VL feed wrapper: elevated
   surface, bright lavender border, soft layered shadow. Rows nest inside
   it as quieter inner cards so the whole list reads as one structured
   table. */
.vl-coll-list { display: flex; flex-direction: column; gap: 10px; padding: 10px; background: #1a162e; box-shadow: var(--shadow-card); border: 1px solid rgba(168,144,232,0.45); border-radius: 12px; }
.vl-coll { position: relative; background: linear-gradient(rgba(255,255,255,0.025), rgba(255,255,255,0.025)), var(--surface); box-shadow: var(--shadow-card); border: 1px solid rgba(168,144,232,0.45); border-radius: 10px; overflow: hidden; transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s; will-change: transform; }
.vl-coll:hover { background: linear-gradient(rgba(168,144,232,0.08), rgba(168,144,232,0.08)), var(--surface); border-color: rgba(168,144,232,0.70); transform: scale(1.01); box-shadow: 0 6px 22px -10px rgba(128,104,216,0.45), 0 1px 0 rgba(255,255,255,0.04) inset, 0 2px 6px rgba(0,0,0,0.35); }
.vl-coll.is-active { border-color: var(--accent-border); box-shadow: inset 3px 0 0 var(--accent), inset -3px 0 0 var(--accent); }
.vl-coll-head { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: transparent; border: none; color: var(--fg); width: 100%; text-align: left; font-family: inherit; }
.vl-coll-head:hover { background: rgba(168,144,232,0.06); }
.vl-coll-eye { color: var(--fg-3); display: flex; flex-shrink: 0; }
.vl-coll-name { font-size: 14px; font-weight: 600; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 240px; }
.vl-coll-count { font-family: var(--font-mono); font-size: 10px; font-weight: 600; padding: 2px 7px; background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 20px; color: var(--fg-2); flex-shrink: 0; }
.vl-coll-fp { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-family: var(--font-mono); color: var(--fg-3); flex-shrink: 0; white-space: nowrap; }
.vl-coll-fp-label { color: var(--fg-3); }
.vl-coll-fp-val { color: var(--fg); font-weight: 600; }
.vl-coll-spacer { flex: 1; }
.vl-pill { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.3px; padding: 2px 6px; border-radius: 20px; text-transform: uppercase; }
.vl-pill-amber { background: rgba(245,158,11,0.12); border: 1px solid rgba(245,158,11,0.28); color: var(--amber); }
.vl-pill-purple { background: rgba(168,144,232,0.12); border: 1px solid rgba(168,144,232,0.30); color: var(--purple-2); }
.vl-chev { color: var(--fg-3); transition: transform 0.15s; flex-shrink: 0; }
.vl-chev.open { transform: rotate(180deg); }

/* TOGGLE */
.vl-toggle { display: inline-flex; align-items: center; gap: 8px; flex-shrink: 0; cursor: pointer; user-select: none; }
.vl-toggle-label { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; color: var(--fg-3); text-transform: uppercase; }
.vl-toggle:hover .vl-toggle-label { color: var(--fg-2); }
.vl-toggle-knob { position: relative; width: 30px; height: 16px; background: rgba(255,255,255,0.06); border: 1px solid var(--border); border-radius: 20px; transition: all 0.15s; }
.vl-toggle-knob::after { content: ""; position: absolute; top: 1px; left: 1px; width: 12px; height: 12px; background: var(--fg-3); border-radius: 50%; transition: all 0.15s; }
.vl-toggle.indet .vl-toggle-knob { border-color: var(--accent-border); }
.vl-toggle.indet .vl-toggle-knob::after { left: 8px; background: var(--accent); }
.vl-toggle.on .vl-toggle-knob { background: var(--accent-soft); border-color: var(--accent); }
.vl-toggle.on .vl-toggle-knob::after { left: 16px; background: var(--accent); }
.vl-toggle.on .vl-toggle-label { color: var(--accent); }

/* GRID + CARDS */
.vl-coll-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 8px; padding: 10px 14px 14px; border-top: 1px solid rgba(168,144,232,0.18); background: rgba(0,0,0,0.30); }
/* Same two-layer trick: opaque surface + faint white wash so cards lift
   above the row, then a stronger lavender wash on hover. */
.vl-card { background: linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0.04)), var(--surface); box-shadow: var(--shadow-card); border: 1px solid rgba(168,144,232,0.32); border-radius: 8px; padding: 6px; cursor: pointer; transition: background 0.18s, border-color 0.18s, transform 0.18s, box-shadow 0.18s, opacity 0.18s; display: flex; flex-direction: column; gap: 5px; will-change: transform; }
.vl-card:hover { background: linear-gradient(rgba(168,144,232,0.12), rgba(168,144,232,0.12)), var(--surface); border-color: rgba(168,144,232,0.65); transform: scale(1.02); box-shadow: 0 8px 24px -10px rgba(168,144,232,0.50), 0 0 0 1px rgba(168,144,232,0.18), 0 0 22px -8px rgba(168,144,232,0.35); }
.vl-card.is-selected { border-color: var(--purple); background: linear-gradient(rgba(168,144,232,0.16), rgba(168,144,232,0.16)), var(--surface); box-shadow: 0 0 0 1px rgba(168,144,232,0.55), 0 0 18px -4px rgba(168,144,232,0.45), 0 6px 20px -10px rgba(168,144,232,0.35); opacity: 1 !important; }
.vl-card.is-selected:hover { border-color: var(--purple); background: linear-gradient(rgba(168,144,232,0.20), rgba(168,144,232,0.20)), var(--surface); box-shadow: 0 0 0 1px rgba(168,144,232,0.7), 0 0 24px -4px rgba(168,144,232,0.55), 0 8px 24px -10px rgba(168,144,232,0.45); }
.vl-coll-grid.has-selection .vl-card:not(.is-selected) { opacity: 0.55; }
.vl-coll-grid.has-selection .vl-card:not(.is-selected):hover { opacity: 0.85; }

.vl-card-img-wrap { position: relative; width: 100%; aspect-ratio: 1; border-radius: 6px; overflow: hidden; background: var(--surface-2); }
.vl-tile-img { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
.vl-tile-glyph { font-family: var(--font-serif); font-size: 32px; font-weight: 700; color: rgba(255,255,255,0.18); letter-spacing: -1px; }
.vl-tile-img::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.06), transparent 60%); }

.vl-check { position: absolute; top: 6px; left: 6px; width: 22px; height: 22px; border-radius: 5px; background: rgba(13,13,20,0.92); border: 1.5px solid rgba(255,255,255,0.55); display: flex; align-items: center; justify-content: center; color: transparent; transition: all 0.12s; box-shadow: 0 2px 6px rgba(0,0,0,0.35); }
.vl-card:hover .vl-check { border-color: rgba(255,255,255,0.85); }
.vl-check.on { background: var(--purple); border-color: var(--purple); color: #1a0e3a; box-shadow: 0 0 0 2px rgba(168,144,232,0.30), 0 2px 8px rgba(168,144,232,0.45); }
.vl-card-eye { position: absolute; top: 5px; right: 5px; width: 16px; height: 16px; border-radius: 4px; background: rgba(13,13,20,0.7); display: flex; align-items: center; justify-content: center; color: var(--fg-3); }

.vl-card-name { font-size: 11px; font-weight: 500; color: var(--fg); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.vl-card-meta { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.vl-card-type { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.3px; color: var(--blue); background: rgba(96,165,250,0.10); border: 1px solid rgba(96,165,250,0.25); padding: 1px 5px; border-radius: 3px; }
.vl-card-mint { display: inline-flex; align-items: center; gap: 3px; font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); text-decoration: none; transition: color 0.15s; }
.vl-card-mint:hover { color: var(--fg); }

/* TOKENS */
.vl-tokens { background: linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0.04)), var(--surface); backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-card); }
.vl-trow { display: grid; grid-template-columns: 32px 1.5fr 1fr 1fr 1fr; gap: 12px; align-items: center; padding: 10px 14px; border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
.vl-trow:last-child { border-bottom: none; }
.vl-trow:hover { background: rgba(168,144,232,0.06); }
.vl-trow.is-selected { background: var(--accent-soft); }
.vl-trow-head { font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; color: var(--fg-3); text-transform: uppercase; cursor: default; background: rgba(0,0,0,0.2); }
.vl-trow-head:hover { background: rgba(0,0,0,0.2); }
.vl-tcheck { width: 16px; height: 16px; border-radius: 4px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; color: transparent; }
.vl-tcheck.on { background: var(--accent); border-color: var(--accent); color: var(--bg); }
.vl-tsym { display: flex; align-items: center; gap: 10px; }
.vl-tsym-bubble { width: 28px; height: 28px; border-radius: 50%; background: linear-gradient(135deg, #2a2040, #1e1e30); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-weight: 700; font-size: 11px; color: var(--fg); }
.vl-tsym-ticker { font-size: 13px; font-weight: 600; }
.vl-tsym-name { font-size: 11px; color: var(--fg-3); }
.vl-tbal, .vl-tusd { font-family: var(--font-mono); font-size: 13px; }
.vl-tbal { color: var(--fg); }
.vl-tusd { color: var(--fg-2); }
.vl-treclaim { font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: var(--green); text-align: right; }
.vl-trow-head .vl-treclaim { color: var(--fg-3); font-weight: 600; text-align: left; }
.vl-tokens-note { padding: 12px 14px; font-size: 11px; color: var(--fg-3); background: rgba(0,0,0,0.15); border-top: 1px dashed var(--border); font-family: var(--font-mono); }

/* EMPTY ACCOUNTS */
.vl-empty-panel { background: linear-gradient(rgba(255,255,255,0.04), rgba(255,255,255,0.04)), var(--surface); backdrop-filter: blur(14px) saturate(140%); -webkit-backdrop-filter: blur(14px) saturate(140%); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; box-shadow: var(--shadow-card); }
.vl-empty-head { display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 14px 16px; border-bottom: 1px solid var(--border); }
.vl-empty-title { font-size: 14px; font-weight: 600; color: var(--fg); }
.vl-empty-sub { font-size: 12px; color: var(--fg-2); margin-top: 2px; }
.vl-empty-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 6px; padding: 10px; }
.vl-empty-cell { display: flex; align-items: center; gap: 10px; padding: 8px 10px; background: rgba(0,0,0,0.2); border: 1px solid var(--border); border-radius: 6px; font-family: var(--font-mono); font-size: 11px; transition: border-color 0.15s; }
.vl-empty-cell:hover { border-color: var(--border-h); }
.vl-empty-cell-idx { color: var(--fg-4); }
.vl-empty-cell-mint { color: var(--fg-2); flex: 1; }
.vl-empty-cell-rent { color: var(--green); font-weight: 600; }

/* ACTION BAR */
.vl-action-bar { position: fixed; left: 50%; bottom: 14px; transform: translateX(-50%); z-index: 50; width: calc(100% - 40px); max-width: 1040px; display: flex; align-items: center; justify-content: space-between; gap: 18px; background: rgba(13,13,20,0.92); backdrop-filter: blur(8px); border: 1px solid var(--border-h); border-radius: 14px; padding: 10px 14px 10px 18px; box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 12px 30px rgba(0,0,0,0.5); }
.vl-action-left { display: flex; align-items: center; gap: 22px; flex-wrap: wrap; }
.vl-action-summary { display: inline-flex; align-items: baseline; gap: 8px; padding: 6px 12px; background: rgba(255,255,255,0.025); border: 1px solid rgba(255,255,255,0.07); border-radius: 8px; }
.vl-action-summary-sep { width: 1px; align-self: stretch; margin: 2px 4px; background: rgba(255,255,255,0.08); }
.vl-action-summary .vl-action-num { font-size: 16px; }
.vl-action-num { font-family: var(--font-mono); font-size: 18px; font-weight: 700; color: var(--fg); font-variant-numeric: tabular-nums; line-height: 1.1; }
.vl-action-num.accent-green { color: var(--green); }
.vl-action-lab { font-family: var(--font-mono); font-size: 9px; font-weight: 600; letter-spacing: 0.3px; color: var(--fg-3); text-transform: uppercase; }

.vl-action-audit { display: inline-flex; align-items: center; gap: 7px; font-family: var(--font-mono); font-size: 10px; font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; padding: 5px 10px; background: rgba(0,0,0,0.3); border: 1px solid var(--border); border-radius: 6px; cursor: help; }
.vl-action-audit.is-ok { color: var(--green); border-color: rgba(79,182,125,0.30); background: rgba(79,182,125,0.08); }
.vl-action-audit.is-warn { color: var(--amber); border-color: rgba(251,191,36,0.30); background: rgba(251,191,36,0.06); }
.vl-audit-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--fg-3); }
.vl-audit-dot.ok { background: var(--green); box-shadow: 0 0 6px var(--green); }
.vl-audit-dot.warn { background: var(--amber); }

.vl-action-right { display: flex; align-items: center; gap: 12px; }
.vl-ack { display: inline-flex; align-items: center; gap: 8px; font-size: 11px; color: var(--fg-2); cursor: pointer; user-select: none; }
.vl-ack input { display: none; }
.vl-ack-box { width: 16px; height: 16px; border-radius: 4px; background: rgba(0,0,0,0.4); border: 1px solid var(--border-h); display: flex; align-items: center; justify-content: center; color: transparent; transition: all 0.12s; }
.vl-ack.on .vl-ack-box { background: var(--red); border-color: var(--red); color: white; }
.vl-ack.on { color: var(--fg); }

/* BUTTONS */
.vl-btn { display: inline-flex; align-items: center; gap: 8px; padding: 11px 18px; border-radius: 8px; border: 1px solid transparent; font-family: var(--font-mono); font-size: 12px; font-weight: 700; letter-spacing: 0.4px; cursor: pointer; transition: all 0.18s; text-transform: uppercase; }
.vl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.vl-btn-primary { background: linear-gradient(180deg, var(--purple-2) 0%, var(--purple) 100%); color: #1a0e3a; border-color: var(--purple); box-shadow: 0 0 0 1px rgba(168,144,232,0.2), 0 6px 18px rgba(128,104,216,0.35); }
.vl-btn-primary:hover:not(:disabled) { filter: brightness(1.08); box-shadow: 0 0 0 1px rgba(168,144,232,0.4), 0 8px 22px rgba(128,104,216,0.5); }

.vl-btn-burn { background: linear-gradient(180deg, #fb6f6f 0%, #e23838 100%); color: #fff; border: 1px solid rgba(255,255,255,0.18); padding: 11px 20px; font-size: 12px; letter-spacing: 0.6px; box-shadow: 0 0 0 1px rgba(239,120,120,0.30), 0 6px 22px rgba(239,120,120,0.40), inset 0 1px 0 rgba(255,255,255,0.18); }
.vl-btn-burn:hover:not(:disabled) { filter: brightness(1.10); box-shadow: 0 0 0 1px rgba(239,120,120,0.55), 0 8px 28px rgba(239,120,120,0.65), 0 0 30px rgba(239,120,120,0.45), inset 0 1px 0 rgba(255,255,255,0.22); transform: translateY(-1px); }
.vl-btn-burn:active:not(:disabled) { transform: translateY(0); filter: brightness(0.95); }
.vl-btn-burn:disabled { background: rgba(239,120,120,0.06); color: rgba(239,120,120,0.35); border-color: rgba(239,120,120,0.15); box-shadow: none; filter: grayscale(0.4); cursor: not-allowed; opacity: 0.55; }

.vl-spinner { width: 11px; height: 11px; border-radius: 50%; border: 1.5px solid currentColor; border-top-color: transparent; animation: vl-spin 0.7s linear infinite; }
@keyframes vl-spin { to { transform: rotate(360deg); } }

/* CONNECT */
.vl-connect { margin: 80px auto 32px; max-width: 460px; padding: 40px 32px 36px; text-align: center; }
.vl-connect-title { font-family: var(--font-serif); font-size: 38px; font-weight: 700; color: var(--fg); letter-spacing: -0.5px; margin-bottom: 10px; line-height: 1.1; }
.vl-connect-body { font-size: 13px; color: var(--fg-2); line-height: 1.55; margin-bottom: 24px; text-wrap: pretty; }
.vl-connect-meta { font-family: var(--font-mono); font-size: 10px; color: var(--fg-4); margin-top: 16px; letter-spacing: 0.3px; }
.vl-btn-lg { padding: 14px 36px; font-size: 12px; letter-spacing: 0.5px; border-radius: 10px; }

.vl-emptystate { padding: 40px 20px; text-align: center; font-family: var(--font-mono); font-size: 13px; color: var(--fg-3); background: var(--surface); border: 1px dashed var(--border); border-radius: 10px; }

.vl-result { position: fixed; left: 50%; bottom: 90px; transform: translateX(-50%); display: inline-flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(79,182,125,0.10); border: 1px solid rgba(79,182,125,0.4); border-radius: 10px; color: var(--green); font-size: 12px; z-index: 60; box-shadow: 0 8px 28px rgba(0,0,0,0.5); }
.vl-result-icon { width: 16px; height: 16px; border-radius: 50%; background: var(--green); color: var(--bg); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
.vl-result b { color: var(--fg); font-weight: 600; }
.vl-result .mono { font-family: var(--font-mono); color: var(--fg-2); }
.vl-result-close { background: transparent; border: none; color: var(--fg-3); font-size: 18px; line-height: 1; margin-left: 8px; }

/* RESPONSIVE */
@media (max-width: 720px) {
  .vl-app { padding: 14px 12px 200px; }
  .vl-stats { grid-template-columns: repeat(2, 1fr); }
  .vl-stat-val { font-size: 18px; }
  .vl-coll-name { max-width: 140px; }
  .vl-coll-fp { display: none; }
  .vl-toolbar-meta { display: none; }
  .vl-action-bar { flex-direction: column; align-items: stretch; gap: 10px; padding: 12px; width: calc(100% - 16px); }
  .vl-action-left { gap: 14px; justify-content: space-between; }
  .vl-action-right { flex-direction: column; align-items: stretch; }
  .vl-ack { justify-content: center; }
  .vl-btn-burn { justify-content: center; }
  .vl-trow { grid-template-columns: 24px 1.3fr 1fr 1fr; }
  .vl-trow .vl-tusd, .vl-trow-head .vl-tusd { display: none; }
  .vl-warn-mode { display: none; }
}
</style>

  const c = "ABCDEFGHJKMNPQRSTUVWXYZabcdefghjkmnpqrstuvwxyz123456789";

    mint: rndAddr(),

}

const EMPTY_ACCOUNTS = 17;
const RENT_PER_ACCOUNT = 0.00203928;

const TABS = [
  { key: "nfts", label: "NFTs" },
  { key: "core", label: "Core" },
  { key: "tokens", label: "Tokens" },
  { key: "empty", label: "Empty Accounts" },
];

// ── Helpers ──────────────────────────────────────────────────────────────
function fmtSol(n) {
  if (!n) return "0";
  if (n < 0.000001) return "<0.000001";
  return n.toLocaleString("en-US", { maximumFractionDigits: 6 });
}
function fmtNum(n) { return n.toLocaleString("en-US", { maximumFractionDigits: 2 }); }
function shortAddr(a, h = 4, t = 4) { if (!a) return ""; return `${a.slice(0, h)}…${a.slice(-t)}`; }

// ── Tile / placeholder artwork ───────────────────────────────────────────
function NFTTile({ item, palette }) {
  const [a, b] = palette || ["#1e1e30", "#2a2040"];
  const glyph = item.name.charAt(0).toUpperCase();
  return (
    <div className="vl-tile-img" style={{ background: `linear-gradient(135deg, ${a} 0%, ${b} 100%)` }}>
      <span className="vl-tile-glyph">{glyph}</span>
    </div>
  );
}

// ── Collection row ───────────────────────────────────────────────────────
function CollectionRow({ entry, expanded, onToggleExpand, selectedSet, onToggleItem, onToggleAll }) {
  const { col, items } = entry;
  const allSelected = items.every((it) => selectedSet.has(it.id));
  const anySelected = items.some((it) => selectedSet.has(it.id));
  const palette = PALETTES[col.slug];

  return (
    <div className={`vl-coll ${anySelected ? "is-active" : ""}`}>
      <button className="vl-coll-head" onClick={onToggleExpand} aria-expanded={expanded}>
        <span className="vl-coll-eye" title={col.hidden ? "Hidden item" : ""}>
          {col.hidden ? (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
              <circle cx="12" cy="12" r="3" />
              <line x1="3" y1="3" x2="21" y2="21" />
            </svg>
          ) : (
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          )}
        </span>
        <span className="vl-coll-name">{col.name}</span>
        <span className="vl-coll-count">{col.count}</span>
        <span className="vl-coll-fp">
          <span className="vl-coll-fp-label">FP</span>
          <span className="vl-coll-fp-val">{fmtSol(col.fp)} SOL</span>
        </span>
        {col.type === "pnft" && <span className="vl-pill vl-pill-amber">PNFT</span>}
        {col.type === "core" && <span className="vl-pill vl-pill-purple">CORE</span>}
        <span className="vl-coll-spacer" />
        <span
          className={`vl-toggle ${allSelected ? "on" : anySelected ? "indet" : ""}`}
          onClick={(e) => { e.stopPropagation(); onToggleAll(items, !allSelected); }}
          role="switch"
          aria-checked={allSelected}
        >
          <span className="vl-toggle-label">SELECT ALL</span>
          <span className="vl-toggle-knob" />
        </span>
        <svg className={`vl-chev ${expanded ? "open" : ""}`} width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
          <polyline points="6 9 12 15 18 9" />
        </svg>
      </button>

      {expanded && (
        <div className={`vl-coll-grid ${anySelected ? "has-selection" : ""}`}>
          {items.map((it) => {
            const sel = selectedSet.has(it.id);
            return (
              <div
                key={it.id}
                className={`vl-card ${sel ? "is-selected" : ""}`}
                onClick={() => onToggleItem(it.id)}
              >
                <div className="vl-card-img-wrap">
                  <NFTTile item={it} palette={palette} />
                  <span className={`vl-check ${sel ? "on" : ""}`}>
                    {sel && (
                      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3.5">
                        <polyline points="20 6 9 17 4 12" />
                      </svg>
                    )}
                  </span>
                  {col.hidden && (
                    <span className="vl-card-eye">
                      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                        <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z" />
                        <circle cx="12" cy="12" r="3" />
                        <line x1="3" y1="3" x2="21" y2="21" />
                      </svg>
                    </span>
                  )}
                </div>
                <div className="vl-card-name">{it.name}</div>
                <div className="vl-card-meta">
                  <span className="vl-card-type">{it.type === "core" ? "CORE" : it.type === "pnft" ? "PNFT" : "NFT"}</span>
                  <a className="vl-card-mint" href="#" onClick={(e) => e.preventDefault()}>
                    {shortAddr(it.mint, 4, 3)}
                    <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                      <path d="M7 17L17 7M9 7h8v8" />
                    </svg>
                  </a>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Tokens table row ────────────────────────────────────────────────────
function TokenRow({ tok, selected, onToggle }) {
  return (
    <div className={`vl-trow ${selected ? "is-selected" : ""}`} onClick={onToggle}>
      <span className={`vl-tcheck ${selected ? "on" : ""}`}>
        {selected && (
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
            <polyline points="20 6 9 17 4 12" />
          </svg>
        )}
      </span>
      <div className="vl-tsym">
        <span className="vl-tsym-bubble">{tok.sym.charAt(0)}</span>
        <div>
          <div className="vl-tsym-ticker">{tok.sym}</div>
          <div className="vl-tsym-name">{tok.name}</div>
        </div>
      </div>
      <div className="vl-tbal">{fmtNum(tok.balance)}</div>
      <div className="vl-tusd">{tok.usd > 0 ? `$${tok.usd.toFixed(2)}` : "—"}</div>
      <div className="vl-treclaim">+{fmtSol(RENT_PER_ACCOUNT)} SOL</div>
    </div>
  );
}

// ── Stat tile ───────────────────────────────────────────────────────────
function Stat({ label, value, sub, accent }) {
  return (
    <div className="vl-stat">
      <div className="vl-stat-label">{label}</div>
      <div className={`vl-stat-val ${accent || ""}`}>{value}</div>
      {sub && <div className="vl-stat-sub">{sub}</div>}
    </div>
  );
}

function ConnectCta({ onConnect }) {
  return (
    <div className="vl-connect">
      <div className="vl-connect-title">Access Required</div>
      <p className="vl-connect-body">
        Connect a Solana wallet to begin. The burner needs Phantom or Solflare to sign close-empty and burn
        transactions. Every burn is gated on wallet match, audit pass, and a destructive-action acknowledgement.
      </p>
      <button className="vl-btn vl-btn-primary vl-btn-lg" onClick={onConnect}>CONNECT WALLET</button>
      <div className="vl-connect-meta">no auto-sign · readonly until wallet present</div>
    </div>
  );
}

function EmptyState({ text }) { return <div className="vl-emptystate">{text}</div>; }

// ── Main app ────────────────────────────────────────────────────────────
function BurnerApp() {
  const [connected, setConnected] = useState(true);
  const [walletAddr] = useState("F7BDq8mNxVMZ4dkR9pHgUcDkYzVpYHnq2cNfgJrLMcYQwE");
  const [scanState, setScanState] = useState("done");
  const [tab, setTab] = useState("nfts");
  const [search, setSearch] = useState("");
  const [expanded, setExpanded] = useState(() => new Set(["med_bux", "morebears"]));
  const [selected, setSelected] = useState(() => new Set());
  const [selectedTokens, setSelectedTokens] = useState(() => new Set());
  const [closeEmpty, setCloseEmpty] = useState(true);
  const [ack, setAck] = useState(false);
  const [signing, setSigning] = useState(false);
  const [signResult, setSignResult] = useState(null);

  const visibleEntries = useMemo(() => {
    let entries = ALL_ITEMS;
    if (tab === "nfts") entries = entries.filter((e) => e.col.type === "nft" || e.col.type === "pnft");
    if (tab === "core") entries = entries.filter((e) => e.col.type === "core");
    if (search) {
      const q = search.toLowerCase();
      entries = entries
        .map((e) => ({ ...e, items: e.items.filter((it) => it.name.toLowerCase().includes(q)) }))
        .filter((e) => e.col.name.toLowerCase().includes(q) || e.items.length > 0);
    }
    return entries;
  }, [tab, search]);

  const totalItems = useMemo(() => {
    const isNftLike = (t) => t === "nft" || t === "pnft";
    if (tab === "nfts") return ALL_ITEMS.filter((e) => isNftLike(e.col.type)).reduce((s, e) => s + e.items.length, 0);
    if (tab === "core") return ALL_ITEMS.filter((e) => e.col.type === "core").reduce((s, e) => s + e.items.length, 0);
    if (tab === "tokens") return TOKENS.length;
    return EMPTY_ACCOUNTS;
  }, [tab]);

  const selectedCount =
    tab === "tokens" ? selectedTokens.size :
    tab === "empty" ? (closeEmpty ? EMPTY_ACCOUNTS : 0) :
    selected.size;

  const reclaimSol = useMemo(() => {
    if (tab === "tokens") return [...selectedTokens].length * RENT_PER_ACCOUNT;
    if (tab === "empty") return closeEmpty ? EMPTY_ACCOUNTS * RENT_PER_ACCOUNT : 0;
    return selected.size * RENT_PER_ACCOUNT;
  }, [tab, selected, selectedTokens, closeEmpty]);

  const feeSol = useMemo(() => Math.max(1, Math.ceil(selectedCount / 8)) * 0.00005, [selectedCount]);

  const onToggleItem = (id) => setSelected((prev) => {
    const next = new Set(prev);
    next.has(id) ? next.delete(id) : next.add(id);
    return next;
  });
  const onToggleAll = (items, on) => setSelected((prev) => {
    const next = new Set(prev);
    items.forEach((it) => (on ? next.add(it.id) : next.delete(it.id)));
    return next;
  });
  const onToggleExpand = (slug) => setExpanded((prev) => {
    const next = new Set(prev);
    next.has(slug) ? next.delete(slug) : next.add(slug);
    return next;
  });
  const onSelectAllVisible = () => {
    const allIds = visibleEntries.flatMap((e) => e.items.map((it) => it.id));
    const allSelected = allIds.every((id) => selected.has(id));
    setSelected((prev) => {
      const next = new Set(prev);
      allIds.forEach((id) => (allSelected ? next.delete(id) : next.add(id)));
      return next;
    });
  };
  const clearSelection = () => { setSelected(new Set()); setSelectedTokens(new Set()); };

  const audit = useMemo(() => ({
    walletMatch: connected,
    frozen: 0,
    unknown: 0,
    passed: connected && selectedCount > 0,
  }), [connected, selectedCount]);

  const burnReady = audit.passed && ack && !signing;

  const onBurn = () => {
    if (!burnReady) return;
    setSigning(true);
    setSignResult(null);
    setTimeout(() => {
      setSigning(false);
      setSignResult({ ok: true, sig: "5xQ3…vT2k", count: selectedCount, sol: reclaimSol });
      clearSelection();
      setAck(false);
    }, 1400);
  };

  const onScan = () => {
    setScanState("scanning");
    setTimeout(() => setScanState("done"), 1100);
  };

  return (
    <div className="vl-app">
      <header className="vl-header">
       <div className="vl-header-inner">
        <div className="vl-brand">
          <a className="vl-brand-logo-link" href="#" onClick={(e) => e.preventDefault()} style={{ display: 'flex', alignItems: 'center', textDecoration: 'none' }}>
            <img src={VL_LOGO_DATA_URI} alt="VictoryLabs" width={125} height={38} draggable={false} className="vl-brand-logo" />
          </a>
          <nav className="vl-brand-nav">
            <button className="vl-nav-item">GROUPS</button>
            <button className="vl-nav-item is-active">BURNER</button>
          </nav>
        </div>
        <div className="vl-header-actions">
          {connected ? (
            <button className="vl-wallet-pill" onClick={() => setConnected(false)} title="Click to disconnect">
              <span className="vl-wallet-dot" />
              <span>{shortAddr(walletAddr, 5, 4)}</span>
              <span className="vl-wallet-net">SOL</span>
            </button>
          ) : (
            <button className="vl-btn vl-btn-primary" onClick={() => setConnected(true)}>CONNECT WALLET</button>
          )}
        </div>
       </div>
      </header>

      <div className="vl-warn">
        <span className="vl-warn-dot" />
        <span><b>destructive</b> · burns are irreversible. every burn requires acknowledgement, audit pass, and wallet match before sign.</span>
        <span className="vl-warn-sep" />
        <span className="vl-warn-mode">safety: <b>strict</b></span>
      </div>

      {!connected ? (
        <ConnectCta onConnect={() => setConnected(true)} />
      ) : (
        <>
          <div className="vl-stats">
            <Stat label="ITEMS FOUND" value={fmtNum(totalItems)} sub={`${ALL_ITEMS.length} collections`} />
            <Stat
              label="SELECTED"
              value={fmtNum(selectedCount)}
              sub={selectedCount === 0 ? "none" : "ready to burn"}
              accent={selectedCount > 0 ? "accent-purple" : ""}
            />
            <Stat label="EST. RECLAIM" value={`${fmtSol(reclaimSol)} SOL`} sub={`≈ $${(reclaimSol * 165).toFixed(2)}`} accent="accent-purple" />
            <Stat label="EST. NETWORK FEE" value={`${fmtSol(feeSol)} SOL`} sub={`${Math.max(1, Math.ceil(selectedCount / 8))} tx`} accent="accent-muted" />
          </div>

          <div className="vl-tabs">
            {TABS.map((t) => {
              const isNftLike = (ty) => ty === "nft" || ty === "pnft";
              const count =
                t.key === "nfts" ? ALL_ITEMS.filter((e) => isNftLike(e.col.type)).reduce((s, e) => s + e.items.length, 0) :
                t.key === "core" ? ALL_ITEMS.filter((e) => e.col.type === "core").reduce((s, e) => s + e.items.length, 0) :
                t.key === "tokens" ? TOKENS.length :
                EMPTY_ACCOUNTS;
              return (
                <button key={t.key} className={`vl-tab ${tab === t.key ? "is-active" : ""}`} onClick={() => setTab(t.key)}>
                  <span>{t.label}</span>
                  <span className="vl-tab-count">{count}</span>
                </button>
              );
            })}
            <span className="vl-tabs-spacer" />
            <button className="vl-tab-action" onClick={onScan} disabled={scanState === "scanning"}>
              {scanState === "scanning" ? (
                <><span className="vl-spinner" /> SCANNING</>
              ) : (
                <>
                  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5">
                    <polyline points="23 4 23 10 17 10" />
                    <path d="M20.49 15a9 9 0 11-2.12-9.36L23 10" />
                  </svg>
                  RESCAN
                </>
              )}
            </button>
          </div>

          {(tab === "nfts" || tab === "core") && (
            <div className="vl-toolbar">
              <div className="vl-search">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
                  <circle cx="11" cy="11" r="7" />
                  <path d="M21 21l-4.3-4.3" />
                </svg>
                <input placeholder="Search collections or items" value={search} onChange={(e) => setSearch(e.target.value)} />
              </div>
              <button className="vl-toolbar-btn" onClick={onSelectAllVisible}>
                {visibleEntries.flatMap((e) => e.items.map((it) => it.id)).every((id) => selected.has(id)) && selected.size > 0
                  ? "DESELECT ALL" : "SELECT ALL"}
              </button>
              <button className="vl-toolbar-btn" onClick={clearSelection} disabled={selected.size === 0}>CLEAR</button>
              <span className="vl-toolbar-meta">
                showing {visibleEntries.reduce((s, e) => s + e.items.length, 0)} items in {visibleEntries.length} collections
              </span>
            </div>
          )}

          <div>
            {(tab === "nfts" || tab === "core") && (
              <div className="vl-coll-list">
                {visibleEntries.length === 0 ? (
                  <EmptyState text={`no ${tab} match your search`} />
                ) : (
                  visibleEntries.map((entry) => (
                    <CollectionRow
                      key={entry.col.slug}
                      entry={entry}
                      expanded={expanded.has(entry.col.slug)}
                      onToggleExpand={() => onToggleExpand(entry.col.slug)}
                      selectedSet={selected}
                      onToggleItem={onToggleItem}
                      onToggleAll={onToggleAll}
                    />
                  ))
                )}
              </div>
            )}

            {tab === "tokens" && (
              <div className="vl-tokens">
                <div className="vl-trow vl-trow-head">
                  <span></span>
                  <div>TOKEN</div>
                  <div>BALANCE</div>
                  <div>USD VALUE</div>
                  <div>RECLAIM</div>
                </div>
                {TOKENS.map((t) => (
                  <TokenRow
                    key={t.sym}
                    tok={t}
                    selected={selectedTokens.has(t.sym)}
                    onToggle={() => setSelectedTokens((prev) => {
                      const next = new Set(prev);
                      next.has(t.sym) ? next.delete(t.sym) : next.add(t.sym);
                      return next;
                    })}
                  />
                ))}
                <div className="vl-tokens-note">
                  burning a token closes its associated account and returns the rent. zero-value or dust tokens are flagged for safe close.
                </div>
              </div>
            )}

            {tab === "empty" && (
              <div className="vl-empty-panel">
                <div className="vl-empty-head">
                  <div>
                    <div className="vl-empty-title">Empty Token Accounts</div>
                    <div className="vl-empty-sub">
                      {EMPTY_ACCOUNTS} accounts holding 0 balance. closing them returns ~{fmtSol(RENT_PER_ACCOUNT)} SOL each.
                    </div>
                  </div>
                  <span
                    className={`vl-toggle ${closeEmpty ? "on" : ""}`}
                    onClick={() => setCloseEmpty(!closeEmpty)}
                    role="switch"
                    aria-checked={closeEmpty}
                  >
                    <span className="vl-toggle-label">CLOSE ALL</span>
                    <span className="vl-toggle-knob" />
                  </span>
                </div>
                <div className="vl-empty-grid">
                  {Array.from({ length: EMPTY_ACCOUNTS }).map((_, i) => (
                    <div className="vl-empty-cell" key={i}>
                      <span className="vl-empty-cell-idx">{String(i + 1).padStart(2, "0")}</span>
                      <span className="vl-empty-cell-mint">{shortAddr(rndAddr(), 4, 4)}</span>
                      <span className="vl-empty-cell-rent">+{fmtSol(RENT_PER_ACCOUNT)}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>

          {selectedCount > 0 && (
            <div className="vl-action-bar">
              <div className="vl-action-left">
                <div className="vl-action-summary">
                  <span className="vl-action-num">{selectedCount}</span>
                  <span className="vl-action-lab">selected</span>
                  <span className="vl-action-summary-sep" />
                  <span className="vl-action-num accent-green">+{fmtSol(reclaimSol)}</span>
                  <span className="vl-action-lab">SOL reclaim</span>
                </div>
                <div
                  className={`vl-action-audit ${audit.passed ? "is-ok" : "is-warn"}`}
                  title={`audit · ${audit.frozen} frozen · ${audit.unknown} unknown · wallet ${audit.walletMatch ? "match" : "mismatch"}`}
                >
                  <span className={`vl-audit-dot ${audit.passed ? "ok" : "warn"}`} />
                  <span>{audit.passed ? "Ready to burn" : "Audit blocked"}</span>
                </div>
              </div>
              <div className="vl-action-right">
                <label className={`vl-ack ${ack ? "on" : ""}`}>
                  <input type="checkbox" checked={ack} onChange={(e) => setAck(e.target.checked)} />
                  <span className="vl-ack-box">
                    {ack && (
                      <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3">
                        <polyline points="20 6 9 17 4 12" />
                      </svg>
                    )}
                  </span>
                  <span>I understand burns are irreversible</span>
                </label>
                <button className="vl-btn vl-btn-burn" disabled={!burnReady} onClick={onBurn}>
                  {signing ? (
                    <><span className="vl-spinner" /> SIGNING…</>
                  ) : (
                    <>
                      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2s4 5 4 9a4 4 0 11-8 0c0-2 1-3 1-3s1 2 3 2c0-3-2-5-2-8 0 0 2 0 2 0z" />
                      </svg>
                      BURN SELECTED
                    </>
                  )}
                </button>
              </div>
            </div>
          )}

          {signResult && (
            <div className="vl-result">
              <span className="vl-result-icon">✓</span>
              <span>
                burned <b>{signResult.count}</b> items · reclaimed <b>+{fmtSol(signResult.sol)} SOL</b> · sig <span className="mono">{signResult.sig}</span>
              </span>
              <button className="vl-result-close" onClick={() => setSignResult(null)}>×</button>
            </div>
          )}
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<BurnerApp />);
</script>
</body>
</html>
